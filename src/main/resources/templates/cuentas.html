<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinCore - Cuentas Bancarias</title>
    <link rel="stylesheet" href="/css/fincore.css" th:href="@{/css/fincore.css}">
</head>
<body>
<div class="app">
    <div th:replace="layout/sidebar :: sidebar('cuentas')"></div>

    <main class="main">
        <header class="topbar">
            <h1>Cuentas Bancarias</h1>
            <div class="user-box">
                <strong th:text="${usuario}">Usuario</strong><br>
                <span th:text="${rol}">Tesorero</span>
            </div>
        </header>

        <section class="content">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Gestión de cuentas bancarias</h3>
                    <button class="btn btn-primary">Nueva Cuenta</button>
                </div>

                <table class="table">
                    <thead>
                    <tr>
                        <th>Banco</th>
                        <th>Número de cuenta</th>
                        <th>CCI</th>
                        <th>Moneda</th>
                        <th>Saldo actual</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>BCP</td>
                        <td>191-00000001-0-00</td>
                        <td>00219100000001000000</td>
                        <td>PEN</td>
                        <td>S/ 47,180.00</td>
                        <td><span class="badge badge-success">Activa</span></td>
                        <td>
                            <button class="btn btn-secondary">Editar</button>
                            <button class="btn btn-danger">Desactivar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Interbank</td>
                        <td>200-00000002-0-00</td>
                        <td>00320000000002000000</td>
                        <td>PEN</td>
                        <td>S/ 15,000.00</td>
                        <td><span class="badge badge-success">Activa</span></td>
                        <td>
                            <button class="btn btn-secondary">Editar</button>
                            <button class="btn btn-danger">Desactivar</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <form class="panel">
                <h3>Registrar cuenta bancaria</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Banco *</label>
                        <input type="text" placeholder="Ejemplo: BCP" required>
                    </div>

                    <div class="form-group">
                        <label>Número de cuenta *</label>
                        <input type="text" placeholder="191-00000001-0-00" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>CCI</label>
                        <input type="text" placeholder="Código de cuenta interbancario">
                    </div>

                    <div class="form-group">
                        <label>Moneda *</label>
                        <select required>
                            <option value="PEN">Soles (PEN)</option>
                            <option value="USD">Dólares (USD)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Saldo inicial *</label>
                    <input type="number" step="0.01" min="0" placeholder="0.00" required>
                </div>

                <div class="actions">
                    <button type="reset" class="btn btn-secondary">Limpiar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
