<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinCore - Nuevo Usuario</title>
    <link rel="stylesheet" th:href="@{/css/fincore.css}">
</head>
<body>
<div class="app">
    <div th:replace="layout/sidebar :: sidebar('usuarios')"></div>

    <main class="main">
        <header class="topbar">
            <h1>Nuevo Usuario</h1>
            <div class="user-box">
                <strong th:text="${usuario}">Usuario</strong><br>
                <span th:text="${rol}">Administrador</span>
            </div>
        </header>

        <section class="content">
            <div class="panel">
                <form th:action="@{/usuarios}" th:object="${usuarioForm}" method="post" class="form-grid">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" th:field="*{nombre}" placeholder="Nombre completo">
                        <p class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                    </div>

                    <div class="form-group">
                        <label for="correo">Correo</label>
                        <input type="email" id="correo" th:field="*{correo}" placeholder="usuario@correo.com">
                        <p class="error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></p>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" th:field="*{password}" placeholder="Contraseña">
                        <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="form-group">
                        <label for="rolId">Rol</label>
                        <select id="rolId" th:field="*{rolId}">
                            <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre}"></option>
                        </select>
                        <p class="error" th:if="${#fields.hasErrors('rolId')}" th:errors="*{rolId}"></p>
                    </div>

                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <select id="estado" th:field="*{estado}">
                            <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}"></option>
                        </select>
                        <p class="error" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></p>
                    </div>

                    <div class="form-actions" style="grid-column: 1 / -1; display:flex; gap:12px;">
                        <button type="submit" class="btn btn-primary">Guardar usuario</button>
                        <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
