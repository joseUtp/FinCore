<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinCore - Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/fincore.css}">
</head>
<body>
<div class="app">
    <div th:replace="layout/sidebar :: sidebar('usuarios')"></div>

    <main class="main">
        <header class="topbar">
            <h1>Usuarios</h1>
            <div class="user-box">
                <strong th:text="${usuario}">Usuario</strong><br>
                <span th:text="${rol}">Administrador</span>
            </div>
        </header>

        <section class="content">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Gestión de Usuarios</h3>
                    <a class="btn btn-primary" th:href="@{/usuarios/nuevo}">Nuevo Usuario</a>
                </div>

                <table class="table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo electrónico</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuarioItem : ${usuarios}">
                        <td th:text="${usuarioItem.nombre}">Nombre</td>
                        <td th:text="${usuarioItem.correo}">correo@correo.com</td>
                        <td th:text="${usuarioItem.rol.nombre}">Rol</td>
                        <td>
                            <span th:classappend="${usuarioItem.estado} == 'ACTIVO' ? 'badge badge-success' : (usuarioItem.estado == 'INACTIVO' ? 'badge' : 'badge badge-danger')"
                                  th:text="${usuarioItem.estado}">Activo</span>
                        </td>
                        <td>
                            <button class="btn btn-secondary">Editar</button>
                            <button class="btn btn-danger">Eliminar</button>
                        </td>
                    </tr>
                    <tr th:if="${usuarios.empty}">
                        <td colspan="5" class="text-center">No hay usuarios registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
